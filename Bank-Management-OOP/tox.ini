[tox]
envlist = py37,py38,py39,py310,py311,py312,lint,type
skipsdist = False

[testenv]
deps =
    pytest>=7.0.0
    pytest-cov>=4.0.0
commands =
    pytest tests/ -v --cov=bank_management --cov-report=term-missing

[testenv:lint]
deps =
    flake8>=5.0.0
    black>=22.0.0
    isort>=5.10.0
commands =
    flake8 bank_management tests
    black --check bank_management tests
    isort --check-only bank_management tests

[testenv:type]
deps =
    mypy>=0.990
commands =
    mypy bank_management --ignore-missing-imports

[testenv:docs]
deps =
commands =
    python -c "import os; print('Documentation available in docs/ directory')"

[testenv:coverage]
deps =
    pytest>=7.0.0
    pytest-cov>=4.0.0
commands =
    pytest tests/ --cov=bank_management --cov-report=html --cov-report=term
    python -c "import os; print('\nCoverage report: htmlcov/index.html')"
